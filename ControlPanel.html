<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ControlPlane - 手台控制面板</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-color: #12141d;
        color: #ffffff;
        padding: 2rem;
        font-size: 15px;
    }
    .card {
        background-color: #1a1e2b;
        border: 1px solid #33394f;
        border-radius: 10px;
        margin-bottom: 1.5rem;
    }
    .card-header {
        background-color: #23283b;
        border-bottom: 1px solid #33394f;
        font-weight: 700;
        font-size: 16px;
        color: #ffffff;
    }
    .div_touch_channel {
        width: 36px;
        height: 80px;
        border: 2px solid #555b78;
        text-align: center;
        align-content: center;
        display: inline-block;
        font-size: 17px;
        font-weight: bold;
        color: #ffffff !important;
        margin: 2px;
        border-radius: 4px;
        background: #202535;
    }
    .div_air {
        width: 36px;
        height: 36px;
        border: 2px solid #555b78;
        display: inline-block;
        margin: 4px;
        border-radius: 6px;
        background: #202535;
    }
    input[type="range"] {
        accent-color: #3b82f6;
    }
    .btn {
        border-radius: 6px;
        font-weight: 500;
    }
    #tip {
        color: #58d8ff;
        font-weight: 600;
        font-size: 16px;
    }
    label, .form-check-label, .form-select {
        color: #ffffff !important;
        font-weight: 500;
    }
    .form-select, .form-check-input {
        background-color: #23283b;
        border-color: #444b66;
        color: #fff;
    }
</style>
</head>
<body>
<div class="container-fluid">
    <div class="card">
        <div class="card-header">手台链接</div>
        <div class="card-body">
            <button id="connectBtn" class="btn btn-primary me-2">连接串口</button>
            <span id="tip" class="ms-3"></span>
            <div class="mt-3">
                <button onclick="startGetInput()" class="btn btn-success me-2">开始测试输入</button>
                <button onclick="stopGetInput()" class="btn btn-warning me-2">停止测试输入</button>
                <button onclick="flashFirmware()" class="btn btn-danger me-2">烧录固件</button>
                <button onclick="readConfig()" class="btn btn-info me-2">读取配置</button>
                <button onclick="setAndSaveConfig()" class="btn btn-secondary">应用设置</button>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">触摸测试</div>
        <div class="card-body">
            <div class="mb-2">
                <div class="div_touch_channel" id="tc31"></div>
                <div class="div_touch_channel" id="tc29"></div>
                <div class="div_touch_channel" id="tc27"></div>
                <div class="div_touch_channel" id="tc25"></div>
                <div class="div_touch_channel" id="tc23"></div>
                <div class="div_touch_channel" id="tc21"></div>
                <div class="div_touch_channel" id="tc19"></div>
                <div class="div_touch_channel" id="tc17"></div>
                <div class="div_touch_channel" id="tc15"></div>
                <div class="div_touch_channel" id="tc13"></div>
                <div class="div_touch_channel" id="tc11"></div>
                <div class="div_touch_channel" id="tc9"></div>
                <div class="div_touch_channel" id="tc7"></div>
                <div class="div_touch_channel" id="tc5"></div>
                <div class="div_touch_channel" id="tc3"></div>
                <div class="div_touch_channel" id="tc1"></div>
            </div>
            <div>
                <div class="div_touch_channel" id="tc32"></div>
                <div class="div_touch_channel" id="tc30"></div>
                <div class="div_touch_channel" id="tc28"></div>
                <div class="div_touch_channel" id="tc26"></div>
                <div class="div_touch_channel" id="tc24"></div>
                <div class="div_touch_channel" id="tc22"></div>
                <div class="div_touch_channel" id="tc20"></div>
                <div class="div_touch_channel" id="tc18"></div>
                <div class="div_touch_channel" id="tc16"></div>
                <div class="div_touch_channel" id="tc14"></div>
                <div class="div_touch_channel" id="tc12"></div>
                <div class="div_touch_channel" id="tc10"></div>
                <div class="div_touch_channel" id="tc8"></div>
                <div class="div_touch_channel" id="tc6"></div>
                <div class="div_touch_channel" id="tc4"></div>
                <div class="div_touch_channel" id="tc2"></div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">AIR 感应区域</div>
        <div class="card-body">
            <div class="div_air" id="air1"></div>
            <div class="div_air" id="air2"></div>
            <div class="div_air" id="air3"></div>
            <div class="div_air" id="air4"></div>
            <div class="div_air" id="air5"></div>
            <div class="div_air" id="air6"></div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">参数配置</div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">硬件种类</label>
                <select id="hw_type" class="form-select w-auto">
                    <option value="3">27寸v2</option>
                    <option value="4">32寸v2</option>
                </select>
            </div>
            <div class="mb-3">
                <div class="form-check form-check-inline">
                    <input type="checkbox" id="cb1" class="form-check-input">
                    <label for="cb1" class="form-check-label">降低缝隙亮度</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="checkbox" id="cb2" class="form-check-input">
                    <label for="cb2" class="form-check-label">启用Windows动态照明</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="checkbox" id="cb3" class="form-check-input">
                    <label for="cb3" class="form-check-label">启用触摸键盘输入</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="checkbox" id="cb4" class="form-check-input">
                    <label for="cb4" class="form-check-label">启用Air键盘输入</label>
                </div>
            </div>
            <div class="mb-3">
                <div class="d-flex align-items-center mb-2">
                    <input type="range" id="rg1" min="50" max="250" step="5" class="w-50 me-3">
                    <label>Air判定低点</label>
                </div>
                <div class="d-flex align-items-center">
                    <input type="range" id="rg2" min="250" max="800" step="10" class="w-50 me-3">
                    <label>Air判定高点</label>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
        const NYANITHM_API_LEVEL = 0x11;
        const CONTROLLER_CONFIG_MAGIC = 0x88;
        const CONTROLLER_CONFIG_VERSION = 0x03;
        const MODE_NORMAL = 0;
        const MODE_4K = 1;
        const MODE_6K = 2;

        const sendQueue = [];
        const recvQueue = [];

        let port = null;
        let writer = null;
        let connected = false;

        let controllerReady = false;

        document.getElementById('connectBtn').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                connected = true;
                document.getElementById('tip').innerText = "串口已连接";

                startReadLoop();
                startWriteLoop();
                console.log("连接设备")
                detectDevice();
                if (controllerReady) {
                    while (true) {
                        getInput();
                    }
                }
            } catch (e) {
                document.getElementById('tip').innerText = "串口连接失败";
            }
        };

        async function startReadLoop() {
            const reader = port.readable.getReader();
            while (connected) {
                const { value } = await reader.read();
                if (value) recvQueue.push(value);
            }
            reader.releaseLock();
        }

        async function startWriteLoop() {
            while (true) {
                if (connected && sendQueue.length > 0) {
                    const data = sendQueue.shift();
                    await writer.write(data);
                }
                await new Promise(r => setTimeout(r, 5));
            }
        }

        function detectDevice() {
            sendQueue.push(new Uint8Array([0xB0]));
            setTimeout(function () {
                while (recvQueue.length > 0) {
                    let data = recvQueue.shift();
                    if (data[0] == 0xB0) {
                        controllerReady = true;
                        console.log("连接到手台");
                        document.getElementById('tip').innerText = "手台已连接";
                        checkAPILevel();
                    }
                }
            }, 10)
        }

        function checkAPILevel() {
            sendQueue.push(new Uint8Array([0xAF]));
            setTimeout(function () {
                if (recvQueue.length == 0) {
                    console.log("固件版本过低")
                    document.getElementById('tip').innerText = "固件版本过低";
                    controllerReady = false;
                    return;
                }

                let data = recvQueue.shift();
                if (data[0] != NYANITHM_API_LEVEL) {
                    console.log("固件版本过低")
                    document.getElementById('tip').innerText = "固件版本过低";
                    controllerReady = false;
                }
                console.log("firmware API level = " + data[0] + " , current = " + NYANITHM_API_LEVEL);

            }, 10)
        }

        function getInput() {
            sendQueue.push(new Uint8Array([0xB1]));
            setTimeout(function () {
                let response = [];
                while (recvQueue.length > 0) {
                    let data = recvQueue.shift();
                    for (let i = 0; i < data.length; i++) {
                        response.push(data[i]);
                    }
                }
                for (let i = 0; i < 32; i++) {
                    let tc = document.getElementById("tc" + (i + 1));
                    tc.innerText = response[i];
                    tc.style.backgroundColor = "rgb(" + (255 - response[i]) + "," + (255 - response[i]) + ",255)"
                }
                for (let i = 0; i < 6; i++) {
                    let square = document.getElementById("air" + (i + 1));
                    if (response[32] & (1 << i)) {
                        square.style.backgroundColor = "#0066cc";
                    } else {
                        square.style.backgroundColor = "#202535";
                    }
                }

            }, 20);

        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        let getInputWorking = false;

        async function loopGetInput() {
            while (true) {
                await wait(20);
                if (getInputWorking) {
                    getInput();
                }
            }
        }

        function startGetInput() {
            getInputWorking = true;
        }

        function stopGetInput() {
            getInputWorking = false;
            setTimeout(function () {
                for (let i = 0; i < 32; i++) {
                    let tc = document.getElementById("tc" + (i + 1));
                    tc.innerText = "";
                }
            }, 50);
        }

        function flashFirmware() {
            if (getInputWorking) {
                alert("需要先停止输入测试");
                return;
            }
            alert("需要手动复制固件到RPI-RP2设备");
            sendQueue.push(new Uint8Array([0xB8]));
            setTimeout(function () {
                location.reload(true);
            }, 100)
        }

        function packControllerConfig(config) {
            const buffer = new ArrayBuffer(128);
            const u8 = new Uint8Array(buffer);
            const u16 = new Uint16Array(buffer);
            const i16 = new Int16Array(buffer);

            let offset = 0;

            u8[offset++] = config.magic;
            u8[offset++] = config.cfgVer;
            u8[offset++] = config.hwVer;

            u8[offset++] = config.cfg0;
            u8[offset++] = config.cfg1;
            u8[offset++] = config.cfg2;
            u8[offset++] = config.cfg3;

            u8[offset++] = config.controller_mode;

            u16[offset >> 1] = config.airMax;
            offset += 2;

            u16[offset >> 1] = config.airMin;
            offset += 2;

            for (let i = 0; i < 5; i++) {
                i16[offset >> 1] = config.heightOffset[i];
                offset += 2;
            }

            u8[offset++] = config.lightLimit;

            for (let i = 0; i < 104; i++) {
                u8[offset++] = 0;
            }

            let xorSum = 0;
            for (let i = 0; i < 127; i++) {
                xorSum ^= u8[i];
            }
            u8[127] = xorSum;
            console.log(u8);
            return u8;
        }

        function unpackControllerConfig(u8Array) {
            if (!(u8Array instanceof Uint8Array) || u8Array.length !== 128) {
                throw new Error('输入必须是长度为128的Uint8Array');
            }

            const buffer = u8Array.buffer;
            const u16 = new Uint16Array(buffer);
            const i16 = new Int16Array(buffer);

            const config = {};
            let offset = 0;

            config.magic = u8Array[offset++];
            config.cfgVer = u8Array[offset++];
            config.hwVer = u8Array[offset++];

            config.cfg0 = u8Array[offset++];
            config.cfg1 = u8Array[offset++];
            config.cfg2 = u8Array[offset++];
            config.cfg3 = u8Array[offset++];

            config.controller_mode = u8Array[offset++];

            config.airMax = u16[offset >> 1];
            offset += 2;

            config.airMin = u16[offset >> 1];
            offset += 2;

            config.heightOffset = [];
            for (let i = 0; i < 5; i++) {
                config.heightOffset.push(i16[offset >> 1]);
                offset += 2;
            }

            config.lightLimit = u8Array[offset++];

            offset += 104;

            config.xorSum = u8Array[offset++];
            config.validXor = verifyXorSum(u8Array);

            return config;
        }

        function verifyXorSum(u8Array) {
            let calc = 0;
            for (let i = 0; i < 127; i++) {
                calc ^= u8Array[i];
            }
            return calc === u8Array[127];
        }

        let currentConfig = {
            magic: CONTROLLER_CONFIG_MAGIC,
            cfgVer: CONTROLLER_CONFIG_VERSION,
            hwVer: 3,
            cfg0: 0,
            cfg1: 0,
            cfg2: 0,
            cfg3: 0,
            controller_mode: MODE_NORMAL,
            airMax: 400,
            airMin: 50,
            heightOffset: [0, 0, 0, 0, 0],
            lightLimit: 255
        };

        function readConfig() {
            if (getInputWorking) {
                alert("需要先停止输入测试");
                return;
            }
            sendQueue.push(new Uint8Array([0xB3]));
            setTimeout(function () {
                let response = [];
                while (recvQueue.length > 0) {
                    let data = recvQueue.shift();
                    for (let i = 0; i < data.length; i++) {
                        response.push(data[i]);
                    }
                }
                console.log(response);
                currentConfig = unpackControllerConfig(new Uint8Array(response));

                document.getElementById("cb1").checked = currentConfig.cfg0 & 0b10;
                document.getElementById("cb2").checked = currentConfig.cfg0 & 0b100;

                document.getElementById("cb3").checked = currentConfig.cfg1 & 0b1;
                document.getElementById("cb4").checked = currentConfig.cfg1 & 0b10;

                document.getElementById("rg1").value = currentConfig.airMin;
                document.getElementById("rg2").value = currentConfig.airMax;

                document.getElementById("hw_type").value = currentConfig.hwVer;

            }, 10)
        }

        function eraseConfig() {
            if (getInputWorking) {
                alert("需要先停止输入测试");
                return;
            }
            sendQueue.push(new Uint8Array([0xB5]));

        }

        function setAndSaveConfig() {
            if (getInputWorking) {
                alert("需要先停止输入测试");
                return;
            }

            currentConfig.hwVer = document.getElementById("hw_type").value;
            currentConfig.airMin = document.getElementById("rg1").value;
            currentConfig.airMax = document.getElementById("rg2").value;

            let cfg0 = 0;
            if (document.getElementById("cb1").checked) {
                cfg0 |= 0b10;
            }
            if (document.getElementById("cb2").checked) {
                cfg0 |= 0b100;
            }
            currentConfig.cfg0 = cfg0;

            let cfg1 = 0;
            if (document.getElementById("cb3").checked) {
                cfg1 |= 0b1;
            }
            if (document.getElementById("cb4").checked) {
                cfg1 |= 0b10;
            }
            currentConfig.cfg1 = cfg1;

            sendQueue.push(new Uint8Array([0xB6]));
            sendQueue.push(packControllerConfig(currentConfig));

            setTimeout(function () {
                let response = [];
                while (recvQueue.length > 0) {
                    let data = recvQueue.shift();
                    for (let i = 0; i < data.length; i++) {
                        response.push(data[i]);
                    }
                }
                console.log("response:");
                console.log(new TextDecoder().decode(new Uint8Array(response)));
                sendQueue.push(new Uint8Array([0xB4]));
            }, 500);

        }

        loopGetInput();
    </script>
</body>
</html>
